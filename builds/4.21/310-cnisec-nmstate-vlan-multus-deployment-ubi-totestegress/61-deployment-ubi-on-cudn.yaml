---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dp-t1ns1-ubipod
  namespace: t1ns1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-ubipod
  template:
    metadata:
      annotations:
        k8s.v1.cni.cncf.io/networks: nad-bridge-vlan-100
      labels:
        app: app-ubipod
    spec:
      containers:
        - name: container-ubipod
          image: registry.access.redhat.com/ubi9/ubi
          command: ["sleep", "infinity"]
