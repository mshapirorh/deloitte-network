---
ensureMatch:
  - description: Ensure namespaces used in example are consistent
    match:
      - kind: Namespace
        name: t1ns1
        key: metadata.name
      - kind: VirtualMachine
        name: vm-windows10
        key: metadata.namespace
  - description: Ensures the CUDN matches the bridge mapping
    match:
      - kind: NodeNetworkConfigurationPolicy
        name: nncp-bridgemapping
        key: spec.desiredState.ovn."bridge-mappings"[0].localnet
      - kind: ClusterUserDefinedNetwork
        name: cudn-ipam-off
        key: spec.network.localnet.physicalNetworkName
  - description: Ensures the VM network configuration matches CUDN name
    match:
      - kind: ClusterUserDefinedNetwork
        name: cudn-ipam-off
        key: metadata.name
      - kind: VirtualMachine
        name: vm-windows10
        key: spec.template.spec.networks[0].multus.networkName
  - description: Ensures the VM NIC maps to VM network
    match:
      - kind: VirtualMachine
        name: vm-windows10
        key: spec.template.spec.domain.devices.interfaces[0].name
      - kind: VirtualMachine
        name: vm-windows10
        key: spec.template.spec.networks[0].name
