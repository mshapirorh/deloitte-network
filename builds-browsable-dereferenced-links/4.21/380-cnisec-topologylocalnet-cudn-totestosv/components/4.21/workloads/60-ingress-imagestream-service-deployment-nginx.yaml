---
# Based on example from:
# https://docs.redhat.com/en/documentation/openshift_container_platform/4.21/html-single/ingress_and_load_balancing/index#nw-metallb-bgp-peer-vrf_configure-metallb-bgp-peers
apiVersion: v1
kind: Service
metadata:
  name: svc-t1ns1
  namespace: t1ns1
  labels:
    app: t1ns1-nginx
    app.kubernetes.io/component: test
    app.kubernetes.io/instance: test
spec:
  selector:
    deployment: dp-t1ns1-nginx
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 80
  sessionAffinity: None
  selector:
    app: t1ns1-server
  type: LoadBalancer
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: is-nginx
  namespace: t1ns1
  generation: 2
  labels:
    app: app-t1ns1-nginx
    app.kubernetes.io/component: test
    app.kubernetes.io/instance: test
spec:
  lookupPolicy:
    local: false
  tags:
  - annotations:
      openshift.io/imported-from: quay.io/redhattraining/hello-world-nginx
    from:
      kind: DockerImage
      name: quay.io/redhattraining/hello-world-nginx
    generation: 2
    importPolicy:
      importMode: Legacy
    name: latest
    referencePolicy:
      type: Source
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dp-t1ns1-nginx
  namespace: t1ns1
  annotations:
    deployment.kubernetes.io/revision: "2"
    image.openshift.io/triggers: '[{"from":{"kind":"ImageStreamTag","name":"test:latest"},"fieldPath":"spec.template.spec.containers[?(@.name==\"test\")].image"}]'
    openshift.io/generated-by: OpenShiftNewApp
  generation: 2
  labels:
    app: app-t1ns1-nginx
    app.kubernetes.io/component: test
    app.kubernetes.io/instance: test
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      deployment: test
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        deployment: dp-t1ns1-nginx
    spec:
      containers:
      - image: quay.io/redhattraining/hello-world-nginx@sha256:7f99ece5f39bf8d5d76a43cd9104a8d0a39f7135821b94bc1ebdc39cdc6dd63b
        imagePullPolicy: IfNotPresent
        name: is-nginx
        ports:
        - containerPort: 8080
          protocol: TCP
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
